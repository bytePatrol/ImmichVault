name: ImmichVault
options:
  bundleIdPrefix: com.immichvault
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.10.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "3"

schemes:
  ImmichVault:
    build:
      targets:
        ImmichVault: all
        ImmichVaultTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ImmichVaultTests

targets:
  ImmichVault:
    type: application
    platform: macOS
    sources:
      - path: ImmichVault
        excludes:
          - "**/.DS_Store"
          - "Resources/Binaries"
      - path: Sources/Core
        group: Modules/Core
      - path: Sources/ImmichClient
        group: Modules/ImmichClient
      - path: Sources/PhotosScanner
        group: Modules/PhotosScanner
      - path: Sources/TranscodeEngine
        group: Modules/TranscodeEngine
      - path: Sources/MetadataEngine
        group: Modules/MetadataEngine
    resources:
      - path: ImmichVault/Resources/Binaries
        buildPhase: resources
        optional: true
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.immichvault.app
        PRODUCT_NAME: ImmichVault
        INFOPLIST_FILE: ImmichVault/Resources/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: ImmichVault/Resources/ImmichVault.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.personal-information.photos-library: true

  ImmichVaultTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: ImmichVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.immichvault.tests
        PRODUCT_MODULE_NAME: ImmichVaultTests
        PRODUCT_NAME: ImmichVaultTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ImmichVault.app/Contents/MacOS/ImmichVault"
        BUNDLE_LOADER: "$(TEST_HOST)"
